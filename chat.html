<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bloom - 24/7 AI Support</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Specific Styles for Chat Bloom Page */
        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Prevent body scroll, let chat container scroll */
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .chat-header {
            padding: 1rem 2rem;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .chat-container {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bot-message {
            background: var(--card-bg);
            color: var(--text);
            border-top-left-radius: 2px;
            align-self: flex-start;
            border: 1px solid var(--border);
        }

        .user-message {
            background: var(--accent);
            color: #ffffff;
            border-top-right-radius: 2px;
            align-self: flex-end;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .chat-input-area {
            background: var(--header-bg);
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 50px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .typing-indicator {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .typing-indicator.active {
            opacity: 1;
        }

        /* Nav back button override */
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* Clickable suggestions */
        .suggested-q {
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
            text-decoration: underline;
            text-underline-offset: 4px;
            color: var(--accent);
        }

        .suggested-q:hover {
            background: var(--accent-glow);
        }

        /* Typing Dots Animation */
        .typing-dots {
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .bot-message strong {
            color: #ef4444; /* Error red if needed */
        }
    </style>
</head>

<body>

    <header class="chat-header">
        <div class="logo" style="font-size: 1.4rem;">Chat Bloom <span
                style="font-size: 0.8rem; color: #94a3b8; font-weight: normal;">Beta</span></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message bot-message">
            Hello! I'm <strong>Chat Bloom</strong>, RankBloom's AI assistant. 🤖<br><br>
            I can help you with:
            <ul style="margin-top: 8px; margin-left: 20px;">
                <li class="suggested-q" onclick="sendSuggestion('How much does a website cost?')">Website pricing &
                    packages</li>
                <li class="suggested-q" onclick="sendSuggestion('I want to book a free consultation')">Booking a
                    consultation</li>
                <li class="suggested-q" onclick="sendSuggestion('How does SEO work?')">SEO questions</li>
                <li class="suggested-q" onclick="sendSuggestion('Do you offer payment plans?')">General inquiries</li>
            </ul>
            <br>
            How can I help you today?
        </div>
    </div>

    <div class="chat-input-area">
        <div style="max-width: 900px; margin: 0 auto; margin-bottom: 8px;" class="typing-indicator"
            id="typingIndicator">Chat Bloom is typing...</div>
        <div class="input-wrapper">
            <input type="text" class="chat-input" placeholder="Type your message..." id="messageInput">
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // Check for saved theme
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'light') {
            document.body.setAttribute('data-theme', 'light');
        }

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // Maintain conversation history
        let messages = [];

        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            div.innerHTML = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        async function handleSend() {
            const userText = messageInput.value.trim();
            if (!userText) return;

            // Add User Message to UI and History
            addMessage(userText, true);
            messages.push({ role: 'user', content: userText });
            messageInput.value = '';

            // Show typing indicator
            typingIndicator.classList.add('active');

            // Create placeholder for bot response
            const botMessageDiv = addMessage('<span class="typing-dots">...</span>', false);
            let fullResponse = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages })
                });

                if (!response.ok) throw new Error('Failed to connect to AI');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                // Remove typing indicator once we start receiving
                typingIndicator.classList.remove('active');
                
                let isFirstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const parts = chunk.split('\n');
                    
                    for (const part of parts) {
                        if (part.trim() === '') continue;
                        
                        // Parse Vercel AI SDK stream format (e.g., 0:"hello")
                        if (part.startsWith('0:')) {
                            try {
                                // Extract the string between the first and last quotes
                                const textContent = part.slice(3, -1)
                                    .replace(/\\n/g, '\n')
                                    .replace(/\\"/g, '"')
                                    .replace(/\\\\/g, '\\');
                                
                                if (isFirstChunk) {
                                    botMessageDiv.textContent = ''; // Clear the dots
                                    isFirstChunk = false;
                                }
                                
                                fullResponse += textContent;
                                botMessageDiv.textContent = fullResponse;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            } catch (e) {
                                console.error('Error parsing chunk:', e);
                            }
                        }
                    }
                }

                messages.push({ role: 'assistant', content: fullResponse });

            } catch (error) {
                console.error(error);
                botMessageDiv.innerHTML = "<strong>Error:</strong> I'm having trouble connecting to the brain. Please check your connection or API key.";
                typingIndicator.classList.remove('active');
            }
        }

        function sendSuggestion(text) {
            messageInput.value = text;
            handleSend();
        }

        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>

</html>
